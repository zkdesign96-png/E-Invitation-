<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Invitation | طلب دعوة إلكترونية فاخرة</title>
    <style>
        /* الألوان العصرية المعتمدة: أخضر فاتح وبيج ناعم دافئ */
        :root {
            --bg-color: #f4f6f4; /* خلفية الموقع العامة أخضر فاتح هادئ */
            --card-bg: #ffffff; /* بيضاء ناصعة للبطاقات لتظهر بوضوح إجباري */
            --green-dark: #3a4d28; /* أخضر زيتي فاخر للنصوص والعناوين */
            --gold-accent: #aa7c11; /* ذهبي عتيق للروابط والحواف */
            --beige-light: #fbf9f4; /* بيج ناعم للأقسام الداخلية */
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        /* الهيدر واللوقو الأساسي */
        header {
            text-align: center;
            padding: 40px 20px;
            background-color: var(--beige-light);
            border-bottom: 2px solid rgba(58, 77, 40, 0.1);
        }

        .logo-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            border: 3px solid var(--green-dark);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(58, 77, 40, 0.15);
            background-color: #ffffff;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        header h1 {
            margin: 5px 0;
            font-size: 32px;
            color: var(--green-dark);
            font-family: 'Times New Roman', serif;
        }

        header p {
            margin: 0;
            color: var(--gold-accent);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* قسم قصة البداية الحرة والمباشرة */
        .story-section {
            padding: 40px 20px;
            text-align: center;
            background-color: #ffffff;
            border-bottom: 1px solid #edf2f7;
            margin: 0 auto;
        }

        .story-section h2 {
            color: var(--green-dark);
            margin-top: 0;
            font-size: 24px;
        }

        .story-section p {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-dark);
            max-width: 750px;
            margin: 0 auto 20px auto;
        }

        .story-section .thanks-msg {
            color: var(--gold-accent);
            font-weight: bold;
            margin-bottom: 25px;
            display: block;
        }

        /* تصميم ظرف الرسالة التفاعلي لفتح المثال */
        .envelope-container {
            margin: 20px auto;
            max-width: 325px;
            cursor: pointer;
        }

        .envelope-box {
            background: linear-gradient(135deg, var(--beige-light) 0%, #ede8dc 100%);
            border: 2px solid var(--gold-accent);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(170, 124, 17, 0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s ease;
        }

        .envelope-box:hover {
            transform: translateY(-3px);
            border-color: var(--green-dark);
        }

        .envelope-icon {
            font-size: 42px;
        }

        .envelope-text {
            font-size: 14px;
            font-weight: bold;
            color: var(--green-dark);
        }

        /* نافذة الرسالة التفاعلية عند فتحها */
        .letter-modal {
            display: none;
            position: fixed;
            z-index: 4000;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(11, 19, 37, 0.85);
            align-items: center;
            justify-content: center;
        }

        .letter-paper {
            background-color: var(--beige-light);
            border: 2px solid var(--gold-accent);
            border-radius: 15px;
            padding: 30px 20px;
            width: 85%;
            max-width: 420px;
            text-align: center;
            position: relative;
        }

        .letter-paper h3 {
            color: var(--green-dark);
            margin-top: 0;
            font-size: 20px;
        }

        .letter-paper p {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-dark);
            margin: 15px 0 25px 0;
        }

        .btn-go-example {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--green-dark);
            color: #ffffff;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            text-decoration: none;
        }

        .close-letter-btn {
            position: absolute;
            top: 12px; right: 15px;
            font-size: 26px;
            cursor: pointer;
            color: #a0aec0;
        }

        /* حاوية تنظيم المحتوى الرئيسي الحرة المتجاوبة */
        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 40px;
        }

        @media (max-width: 992px) {
            .main-content {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }

        .gallery-section h2, .form-section h2 {
            color: var(--green-dark);
            border-bottom: 2px solid var(--green-dark);
            padding-bottom: 8px;
            margin-bottom: 25px;
            font-size: 20px;
        }

        /* أزرار التحكم بالمعرض */
        .tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background-color: #ffffff;
            color: var(--text-dark);
            border: 1px solid rgba(58, 77, 40, 0.15);
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--green-dark);
            color: #ffffff;
            border-color: var(--green-dark);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .grid-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .demo-card {
            background-color: #ffffff;
            border: 1px solid rgba(58, 77, 40, 0.1);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: transform 0.2s ease;
        }

        .demo-card:hover {
            transform: translateY(-3px);
            border-color: var(--gold-accent);
        }

        .demo-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }

        .demo-card p {
            text-align: center;
            padding: 8px;
            margin: 0;
            font-size: 12px;
            color: var(--green-dark);
            font-weight: bold;
            background-color: var(--beige-light);
        }

        .custom-note {
            font-size: 13px;
            color: var(--green-dark);
            background-color: rgba(74, 93, 47, 0.06);
            padding: 12px;
            border-right: 4px solid var(--green-dark);
            border-radius: 0 4px 4px 0;
            margin-top: 15px;
            font-weight: 500;
        }

        /* قسم استمارة الطلب مستقل ومرئي */
        .form-section {
            background-color: var(--beige-light);
            padding: 30px 25px;
            border-radius: 14px;
            border: 1px solid rgba(74, 93, 47, 0.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            height: fit-content;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: bold;
            color: var(--green-dark);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid rgba(74, 93, 47, 0.2);
            background-color: #ffffff;
            color: #000000;
            box-sizing: border-box;
            font-size: 16px;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--green-dark);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--green-dark);
            color: #ffffff;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* الخاتمة أسفل الصفحة */
        .beautiful-closing {
            text-align: center;
            padding: 45px 20px;
            font-size: 1
