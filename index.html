<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Invitation | طلب دعوة إلكترونية فاخرة</title>
    <style>
        /* المتغيرات ونظام الألوان المحدث */
        :root {
            --main-box-bg: #ffffff;
            --beige-light: #fbf9f4;
            --green-dark: #3a4d28;
            --gold-accent: #aa7c11;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('background.png') repeat center center fixed;
            background-size: 280px;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        /* حاوية الموقع الرئيسية */
        .page-wrapper {
            max-width: 1000px;
            margin: 30px auto;
            background-color: var(--main-box-bg);
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            border: 2px solid var(--gold-accent);
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .page-wrapper {
                margin: 10px;
                border-radius: 12px;
            }
        }

        /* الهيدر واللوقو */
        header {
            text-align: center;
            padding: 35px 20px;
            background-color: var(--beige-light);
            border-bottom: 2px solid rgba(58, 77, 40, 0.08);
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            border: 2px solid var(--green-dark);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(58, 77, 40, 0.1);
            background-color: #ffffff;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        header h1 {
            margin: 5px 0;
            font-size: 28px;
            color: var(--green-dark);
            font-family: 'Times New Roman', serif;
        }

        header p {
            margin: 0;
            color: var(--gold-accent);
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* قسم قصة البداية */
        .story-section {
            padding: 30px 20px;
            text-align: center;
            background-color: #ffffff;
            border-bottom: 1px solid #edf2f7;
        }

        .story-section h2 {
            color: var(--green-dark);
            margin-top: 0;
            font-size: 22px;
        }

        .story-section p {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-dark);
            max-width: 750px;
            margin: 0 auto 15px auto;
        }

        .story-section .thanks-msg {
            color: var(--gold-accent);
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* تصميم ظرف الرسالة التفاعلي المغلق */
        .envelope-container {
            margin: 20px auto;
            max-width: 320px;
            cursor: pointer;
            perspective: 1000px;
        }

        .envelope-box {
            background: linear-gradient(135deg, var(--beige-light) 0%, #ede8dc 100%);
            border: 2px solid var(--gold-accent);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(170, 124, 17, 0.15);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .envelope-box:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 25px rgba(170, 124, 17, 0.25);
            border-color: var(--green-dark);
        }

        .envelope-icon {
            font-size: 40px;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .envelope-text {
            font-size: 14px;
            font-weight: bold;
            color: var(--green-dark);
        }

        /* نافذة الرسالة التفاعلية عند فتحها */
        .letter-modal {
            display: none;
            position: fixed;
            z-index: 4000;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(11, 19, 37, 0.85);
            align-items: center;
            justify-content: center;
        }

        .letter-paper {
            background-color: var(--beige-light);
            border: 2px solid var(--gold-accent);
            border-radius: 15px;
            padding: 30px 20px;
            width: 85%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            position: relative;
            animation: openLetter 0.4s ease-out;
        }

        @keyframes openLetter {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .letter-paper h3 {
            color: var(--green-dark);
            margin-top: 0;
            font-size: 20px;
        }

        .letter-paper p {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-dark);
            margin: 15px 0 25px 0;
        }

        .btn-go-example {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--green-dark);
            color: #ffffff;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(58, 77, 40, 0.2);
            transition: background 0.2s;
        }

        .btn-go-example:hover {
            background-color: #2e3d20;
        }

        .close-letter-btn {
            position: absolute;
            top: 12px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #a0aec0;
        }

        .close-letter-btn:hover {
            color: var(--green-dark);
        }

        /* حاوية تنظيم المحتوى */
        .main-content {
            padding: 30px 20px;
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 30px;
            background-color: #ffffff;
        }

        @media (max-width: 992px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .gallery-section h2, .form-section h2 {
            color: var(--green-dark);
            border-bottom: 2px solid var(--green-dark);
            padding-bottom: 8px;
            margin-bottom: 20px;
            font-size: 18px;
        }

        /* تصميم الأزرار التفاعلية للتبديل بين الفئات */
        .tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background-color: var(--beige-light);
            color: var(--text-dark);
            border: 1px solid rgba(58, 77, 40, 0.15);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--green-dark);
            color: #ffffff;
            border-color: var(--green-dark);
        }

        /* حاويات الفئات التفاعلية */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .grid-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .demo-card {
            background-color: var(--beige-light);
            border: 1px solid rgba(58, 77, 40, 0.1);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .demo-card:hover {
            transform: translateY(-3px);
            border-color: var(--gold-accent);
        }

        .demo-card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            display: block;
        }

        .demo-card p {
            text-align: center;
            padding: 6px;
            margin: 0;
            font-size: 11px;
            color: var(--green-dark);
            font-weight: bold;
        }

        .custom-note {
            font-size: 12px;
            color: var(--green-dark);
            background-color: rgba(74, 93, 47, 0.05);
            padding: 10
