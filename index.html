<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Invitation | طلب دعوة إلكترونية فاخرة</title>
    <style>
        /* نظام الألوان الجديد: أخضر فاتح وبيج فاتح مع لمسات ذهبية */
        :root {
            --bg-color: #f4f7f5; /* خلفية الصفحة العامة - أخضر هادئ فاتح جداً */
            --card-bg: rgba(255, 255, 255, 0.96); /* خلفية البطاقات بيضاء ناصعة مائلة للبيج */
            --green-premium: #556b2f; /* أخضر زيتي راقي للنصوص والعناوين */
            --gold-primary: #aa7c11; /* ذهبي دافئ متناسق مع البيج */
            --gold-secondary: #d4af37;
            --text-color: #2c3e50; /* لون نصوص داكن وواضح جداً للقراءة */
            --text-muted: #576574;
            --beige-accent: #f5f0e6; /* لون بيج ناعم للأقسام */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* دمج الصورة كخلفية مع طبقة حماية فاتحة باللون البيج والأخضر */
            background: linear-gradient(rgba(245, 240, 230, 0.85), rgba(244, 247, 245, 0.9)), url('background.png') repeat center center fixed;
            background-size: 300px;
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        /* الهيدر واللوقو */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(245, 240, 230, 0.95) 0%, rgba(244, 247, 245, 0.8) 100%);
            border-bottom: 1px solid rgba(85, 107, 47, 0.2);
            position: relative;
            z-index: 10;
        }

        .logo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            border: 2px solid var(--green-premium);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(85, 107, 47, 0.15);
            background-color: #ffffff;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        header h1 {
            margin: 10px 0 5px 0;
            font-size: 32px;
            color: var(--green-premium);
            font-family: 'Times New Roman', serif;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        header p {
            margin: 0;
            color: var(--gold-primary);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* لافتة الترحيب الثابتة */
        .welcome-banner {
            max-width: 800px;
            margin: 30px auto 0 auto;
            background: linear-gradient(45deg, var(--green-premium), #6b8e23);
            color: #ffffff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 12px rgba(85, 107, 47, 0.2);
            position: relative;
            z-index: 10;
        }

        /* قصة البداية */
        .story-section {
            max-width: 800px;
            margin: 20px auto 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(85, 107, 47, 0.15);
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            position: relative;
            z-index: 10;
        }

        .story-section h2 {
            color: var(--green-premium);
            margin-top: 0;
            font-size: 24px;
        }

        .story-section p {
            color: var(--text-color);
            font-size: 16px;
            line-height: 1.8;
            margin: 0 0 15px 0;
        }

        .story-section .thanks-msg {
            color: var(--gold-primary);
            font-weight: bold;
            font-size: 15px;
        }

        /* حاوية المحتوى الرئيسي */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 40px;
            position: relative;
            z-index: 10;
        }
