<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Invitation | طلب دعوة إلكترونية فاخرة</title>
    <style>
        /* نظام الألوان الفاخر المعتمد: أخضر فاتح وبيج مع خانات شفافة */
        :root {
            --bg-color: #f4f6f4; 
            --card-transparent: rgba(255, 255, 255, 0.65); /* جعل البطاقات شفافة وأنيقة */
            --green-dark: #3a4d28; 
            --gold-accent: #aa7c11; 
            --beige-light: rgba(251, 249, 244, 0.85); /* خانات شفافة ناعمة مائلة للبيج */
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        /* الهيدر واللوقو */
        header {
            text-align: center;
            padding: 40px 20px;
            background-color: #ffffff;
            border-bottom: 2px solid rgba(58, 77, 40, 0.1);
        }

        .logo-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            border: 3px solid var(--green-dark);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(58, 77, 40, 0.15);
            background-color: #ffffff;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        header h1 {
            margin: 5px 0;
            font-size: 32px;
            color: var(--green-dark);
            font-family: 'Times New Roman', serif;
        }

        header p {
            margin: 0;
            color: var(--gold-accent);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* قسم قصة البداية الحرة */
        .story-section {
            padding: 40px 20px;
            text-align: center;
            background-color: #ffffff;
            border-bottom: 1px solid #edf2f7;
        }

        .story-section h2 {
            color: var(--green-dark);
            margin-top: 0;
            font-size: 24px;
        }

        .story-section p {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-dark);
            max-width: 750px;
            margin: 0 auto 20px auto;
        }

        .story-section .thanks-msg {
            color: var(--gold-accent);
            font-weight: bold;
            margin-bottom: 25px;
            display: block;
        }

        /* ظرف الرسالة التفاعلي للمعاينة */
        .envelope-container {
            margin: 20px auto;
            max-width: 325px;
            cursor: pointer;
        }

        .envelope-box {
            background: linear-gradient(135deg, rgba(251, 249, 244, 0.9) 0%, rgba(237, 232, 220, 0.9) 100%);
            border: 2px solid var(--gold-accent);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(170, 124, 17, 0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .envelope-icon {
            font-size: 42px;
        }

        .envelope-text {
            font-size: 14px;
            font-weight: bold;
            color: var(--green-dark);
        }

        /* نافذة الرسالة المنبثقة للرابط */
        .letter-modal {
            display: none;
            position: fixed;
            z-index: 4000;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(11, 19, 37, 0.85);
            align-items: center;
            justify-content: center;
        }

        .letter-paper {
            background-color: #ffffff;
            border: 2px solid var(--gold-accent);
            border-radius: 15px;
            padding: 30px 20px;
            width: 85%;
            max-width: 420px;
            text-align: center;
            position: relative;
        }

        .letter-paper h3 {
            color: var(--green-dark);
            margin-top: 0;
            font-size: 20px;
        }

        .letter-paper p {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-dark);
            margin: 15px 0 25px 0;
        }

        .btn-go-example {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--green-dark);
            color: #ffffff;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            text-decoration: none;
        }

        .close-letter-btn {
            position: absolute;
            top: 12px; right: 15px;
            font-size: 26px;
            cursor: pointer;
            color: #a0aec0;
        }

        /* حاوية تنظيم المحتوى الرئيسي */
        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 40px;
        }

        @media (max-width: 992px) {
            .main-content {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }

        .gallery-section h2, .form-section h2 {
            color: var(--green-dark);
            border-bottom: 2px solid var(--green-dark);
            padding-bottom: 8px;
            margin-bottom: 25px;
            font-size: 20px;
        }

        /* أزرار التصفح الذكية للتبويب */
        .tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background-color: #ffffff;
            color: var(--text-dark);
            border: 1px solid rgba(58, 77, 40, 0.15);
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            white-space: nowrap;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--green-dark);
            color: #ffffff;
            border-color: var(--green-dark);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .grid-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .demo-card {
            background-color: var(--card-transparent); /* تفعيل ميزة الشفافية للنماذج */
            border: 1px solid rgba(58, 77, 40, 0.1);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            backdrop-filter: blur(5px);
        }

        .demo-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }

        .demo-card p {
            text-align: center;
            padding: 8px;
            margin: 0;
            font-size: 12px;
            color: var(--green-dark);
            font-weight: bold;
            background-color: rgba(251, 249, 244, 0.7);
        }

        .custom-note {
            font-size: 13px;
            color: var(--green-dark);
            background-color: rgba(74, 93, 47, 0.06);
            padding: 12px;
            border-right: 4px solid var(--green-dark);
            border-radius: 0 4px 4px 0;
            margin-top: 15px;
            font-weight: 500;
        }

        /* تصميم استمارة الطلب بالخانات الشفافة (تم إصلاح عدم ظهورها) */
        .form-section {
            background-color: var(--card-transparent); /* جعل خلفية الاستمارة شفافة بالكامل */
            padding: 30px 25px;
            border-radius: 14px;
            border: 1px solid rgba(74, 93, 47, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            backdrop-filter: blur(10px); /* فلتر ضبابي ناعم تحت الشفافية */
            height: fit-content;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: bold;
            color: var(--green-dark);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid rgba(74, 93, 47, 0.25);
            background-color: rgba(255, 255, 255, 0.8); /* حقول إدخال شفافة ناعمة مقروءة */
            color: #000000;
            box-sizing: border-box;
            font-size: 16px;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--green-dark);
            background-color: #ffffff;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--green-dark);
            color: #ffffff;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .beautiful-closing {
            text-align: center;
            padding: 45px 20px;
            font-size: 18px;
            font-weight: bold;
            color: var(--green-dark);
            font-style: italic;
            background-color: #ffffff;
            border-top: 1px solid #edf2f7;
        }

        /* نافذة التكبير الكبيرة المحسنة (Lightbox) لتعمل على الهواتف فوراً */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999; /* رفع حماية النافذة للأعلى لكي تظهر إجبارياً */
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
        }

        .lightbox-content {
            max-width: 92%;
            max-height: 82%;
            border: 2px solid #ffffff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .lightbox-close {
            position: absolute;
            top: 25px; right: 25px;
            color: #ffffff;
            font-size: 45px;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 25px;
            color: var(--green-dark);
            font-size: 12px;
            font-weight: bold;
            border-top: 1px solid #edf2f7;
            background-color: var(--beige-light);
        }
    </style>
</head>
