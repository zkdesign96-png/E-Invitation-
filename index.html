<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Invitation | طلب دعوة إلكترونية فاخرة</title>
    <style>
        /* نظام ألوان عصري: أخضر هادئ وبيج فاخر مع تباين عالي جداً */
        :root {
            --bg-color: #0b1325;
            --main-box-bg: #ffffff;
            --green-premium: #4a5d2f;
            --gold-primary: #aa7c11;
            --beige-accent: #fcf9f2;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('background.png') repeat center center fixed;
            background-size: 280px;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        /* حاوية بيضاء رئيسية تجمع كل محتوى الموقع */
        .page-wrapper {
            max-width: 1100px;
            margin: 30px auto;
            background-color: var(--main-box-bg);
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            border: 3px solid var(--gold-primary);
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .page-wrapper {
                margin: 10px;
                border-radius: 12px;
            }
        }

        /* الهيدر واللوقو */
        header {
            text-align: center;
            padding: 40px 20px;
            background-color: var(--beige-accent);
            border-bottom: 2px solid rgba(74, 93, 47, 0.15);
        }

        .logo-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            border: 2px solid var(--green-premium);
            overflow: hidden;
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        header h1 {
            margin: 10px 0 5px 0;
            font-size: 30px;
            color: var(--green-premium);
            font-family: 'Times New Roman', serif;
        }

        header p {
            margin: 0;
            color: var(--gold-primary);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* لافتة الترحيب */
        .welcome-banner {
            background-color: var(--green-premium);
            color: #ffffff;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
        }

        /* قصة البداية */
        .story-section {
            padding: 30px 20px;
            text-align: center;
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }

        .story-section h2 {
            color: var(--green-premium);
            margin-top: 0;
            font-size: 22px;
        }

        .story-section p {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-dark);
            max-width: 800px;
            margin: 0 auto 15px auto;
        }

        .story-section .thanks-msg {
            color: var(--gold-primary);
            font-weight: bold;
        }

        /* حاوية المحتوى الرئيسي */
        .container {
            padding: 30px 20px;
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 30px;
            background-color: #ffffff;
        }

        @media (max-width: 992px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* أقسام المعرض والاستمارة */
        .gallery-section h2, .form-section h2 {
            color: var(--green-premium);
            border-bottom: 2px solid var(--green-premium);
