<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Invitation | طلب دعوة إلكترونية فاخرة</title>
    <style>
        /* نظام الألوان الفاخر: أخضر فاتح وبيج مع تأثير الشفافية الزجاجية */
        :root {
            --green-dark: #3a4d28; 
            --gold-accent: #aa7c11; 
            --text-dark: #1e293b;
            /* خانات شفافة وأنيقة تظهر الخلفية من ورائها */
            --glass-bg: rgba(255, 255, 255, 0.55); 
            --glass-beige: rgba(251, 249, 244, 0.75);
            --glass-border: rgba(58, 77, 40, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* إعادة دمج وتفعيل صورة الخلفية الداكنة الفخمة مع تكرارها بشكل متناسق */
            background: linear-gradient(rgba(244, 246, 244, 0.45), rgba(244, 246, 244, 0.45)), url('background.png') repeat center center fixed;
            background-size: 280px;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        /* الهيدر واللوقو شفاف وأنيق */
        header {
            text-align: center;
            padding: 40px 20px;
            background-color: rgba(251, 249, 244, 0.85);
            border-bottom: 2px solid var(--glass-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .logo-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            border: 3px solid var(--green-dark);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(58, 77, 40, 0.15);
            background-color: #ffffff;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        header h1 {
            margin: 5px 0;
            font-size: 32px;
            color: var(--green-dark);
            font-family: 'Times New Roman', serif;
        }

        header p {
            margin: 0;
            color: var(--gold-accent);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* قسم قصة البداية شفاف وبمظهر زجاجي عصري */
        .story-section {
            padding: 40px 20px;
            text-align: center;
            background-color: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .story-section h2 {
            color: var(--green-dark);
            margin-top: 0;
            font-size: 24px;
        }

        .story-section p {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-dark);
            max-width: 750px;
            margin: 0 auto 20px auto;
            font-weight: 500;
        }

        .story-section .thanks-msg {
            color: var(--gold-accent);
            font-weight: bold;
            margin-bottom: 25px;
            display: block;
        }

        /* بطاقة الرسالة التفاعلية الشفافة والمفتوحة */
        .real-letter-card {
            background: linear-gradient(135deg, rgba(251, 249, 244, 0.85) 0%, rgba(243, 238, 225, 0.85) 100%);
            border: 2px solid var(--gold-accent);
            border-radius: 15px;
            padding: 25px 20px;
            max-width: 450px;
            margin: 20px auto 0 auto;
            text-align: center;
            box-shadow: 0 8px 25px rgba(170, 124, 17, 0.1);
            backdrop-filter: blur(5px);
        }

        .real-letter-card h3 {
            color: var(--green-dark);
            margin: 0 0 10px 0;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .real-letter-card p {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        .btn-go-example {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--green-dark);
            color: #ffffff;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(58, 77, 40, 0.2);
        }

        /* حاوية تنظيم المحتوى الرئيسي المتجاوبة */
        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 40px;
        }

        @media (max-width: 992px) {
            .main-content {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }

        .gallery-section h2, .form-section h2 {
            color: var(--green-dark);
            border-bottom: 2px solid var(--green-dark);
            padding-bottom: 8px;
            margin-bottom: 25px;
            font-size: 20px;
        }

        /* أزرار التصفح الذكية للتبويب شفاف وأنيق */
        .tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background-color: rgba(255, 255, 255, 0.7);
            color: var(--text-dark);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            white-space: nowrap;
            backdrop-filter: blur(5px);
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--green-dark);
            color: #ffffff;
            border-color: var(--green-dark);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .grid-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        /* جعل بطاقات التصاميم شفافة بالكامل */
        .demo-card {
            background-color: var(--glass-bg); 
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: transform 0.2s ease;
        }

        .demo-card:hover {
            transform: translateY(-3px);
            border-color: var(--gold-accent);
        }

        .demo-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }

        .demo-card p {
            text-align: center;
            padding: 8px;
            margin: 0;
            font-size: 12px;
            color: var(--green-dark);
            font-weight: bold;
            background-color: rgba(251, 249, 244, 0.65);
        }

        .custom-note {
            font-size: 13px;
            color: var(--green-dark);
            background-color: rgba(74, 93, 47, 0.1);
            padding: 12px;
            border-right: 4px solid var(--green-dark);
            border-radius: 0 4px 4px 0;
            margin-top: 15px;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        /* جعل قسم استمارة الطلب شفافاً وزجاجياً فخماً جداً */
        .form-section {
            background-color: var(--glass-beige); 
            padding: 30px 25px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(58, 77, 40, 0.05);
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            height: fit-content;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: bold;
            color: var(--green-dark);
        }

        /* حقول إدخال شفافة ناعمة وبمظهر عصري */
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px;

            border: 1px solid rgba(58, 77, 40, 0.2);
            background-color: rgba(255, 255, 255,
