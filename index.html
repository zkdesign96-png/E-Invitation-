<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Invitation | طلب دعوة إلكترونية فاخرة</title>
    <style>
        /* المتغيرات ونظام الألوان المحدث: أخضر فاتح وبيج ناعم للمحتوى */
        :root {
            --main-box-bg: #ffffff;
            --beige-light: #fbf9f4; /* بيج ناعم ودافئ للبطاقات */
            --green-dark: #3a4d28; /* أخضر زيتي فاخر للنصوص والعناوين */
            --gold-accent: #aa7c11; /* ذهبي عتيق */
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* إعادة تفعيل وإظهار صورة الخلفية الأصلية */
            background: url('background.png') repeat center center fixed;
            background-size: 280px;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
        }

        /* حاوية الموقع الرئيسية لتظهر بشكل فاخر فوق الخلفية الداكنة */
        .page-wrapper {
            max-width: 1000px;
            margin: 30px auto;
            background-color: var(--main-box-bg);
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            border: 2px solid var(--gold-accent);
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .page-wrapper {
                margin: 10px;
                border-radius: 12px;
            }
        }

        /* الهيدر واللوقو */
        header {
            text-align: center;
            padding: 35px 20px;
            background-color: var(--beige-light);
            border-bottom: 1px solid rgba(58, 77, 40, 0.08);
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            border: 2px solid var(--green-dark);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(58, 77, 40, 0.1);
            background-color: #ffffff;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        header h1 {
            margin: 5px 0;
            font-size: 28px;
            color: var(--green-dark);
            font-family: 'Times New Roman', serif;
        }

        header p {
            margin: 0;
            color: var(--gold-accent);
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* قسم قصة البداية */
        .story-section {
            padding: 30px 20px;
            text-align: center;
            background-color: #ffffff;
            border-bottom: 1px solid #edf2f7;
        }

        .story-section h2 {
            color: var(--green-dark);
            margin-top: 0;
            font-size: 22px;
        }

        .story-section p {
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-dark);
            max-width: 750px;
            margin: 0 auto 15px auto;
        }

        .story-section .thanks-msg {
            color: var(--gold-accent);
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* زر المعاينة والمثال تحت رسالة قصة البداية مباشرة */
        .btn-example-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--beige-light);
            color: var(--green-dark);
            border: 2px dashed var(--green-dark);
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .btn-example-link:hover {
            background-color: var(--green-dark);
            color: #ffffff;
            border-style: solid;
            transform: translateY(-2px);
        }

        /* حاوية تنظيم المحتوى */
        .main-content {
            padding: 30px 20px;
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 30px;
            background-color: #ffffff;
        }

        @media (max-width: 992px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .gallery-section h2, .form-section h2 {
            color: var(--green-dark);
            border-bottom: 2px solid var(--green-dark);
            padding-bottom: 8px;
            margin-bottom: 20px;
            font-size: 18px;
        }

        /* تصميم الأزرار التفاعلية الفاخرة للتبديل بين الفئات */
        .tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background-color: var(--beige-light);
            color: var(--text-dark);
            border: 1px solid rgba(58, 77, 40, 0.15);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--green-dark);
            color: #ffffff;
            border-color: var(--green-dark);
        }

        /* حاويات الفئات التفاعلية */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .grid-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .demo-card {
            background-color: var(--beige-light);
            border: 1px solid rgba(58, 77, 40, 0.1);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .demo-card:hover {
            transform: translateY(-3px);
            border-color: var(--gold-accent);
        }

        .demo-card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            display: block;
        }

        .demo-card p {
            text-align: center;
            padding: 6px;
            margin: 0;
            font-size: 11px;
            color: var(--green-dark);
            font-weight: bold;
        }

        .custom-note {
            font-size: 12px;
            color: var(--green-dark);
            background-color: rgba(74, 93, 47, 0.05);
            padding: 10px;
            border-right: 3px solid var(--green-dark);
            border-radius: 0 4px 4px 0;
            margin-top: 10px;
        }

        /* قسم استمارة الطلب */
        .form-section {
            background-color: var(--beige-light);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(74, 93, 47, 0.12);
            height: fit-content;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: bold;
            color: var(--green-dark);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(74, 93, 47, 0.2);
            background-color: #ffffff;
            color: #000000;
            box-sizing: border-box;
            font-size: 15px;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--green-dark);
        }

        /* زر الإرسال */
        .btn-submit {
            width: 100%;
            background-color: var(--green-dark);
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #2e3d20;
        }

        /* الخاتمة أسفل الصفحة */
        .beautiful-closing {
            text-align: center;
            padding: 35px 20px;
            font-size: 16px;
            font-weight: bold;
            color: var(--green-dark);
            font-style: italic;
            background-color: #ffffff;
            border-top: 1px solid #edf2f7;
        }

        /* نافذة التكبير */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 3000;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            align-items: center;
            justify-content: center;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 80%;
            border: 2px solid #ffffff;
            border-radius: 8px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px; right: 25px;
            color: #ffffff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--green-dark);
            font-size: 11px;
            font-weight: bold;
            border-top: 1px solid #edf2f7;
            background-color: var(--beige-light);
        }
    </style>
</head>
<body>

    <div class="page-wrapper">

        <header>
            <div class="logo-container">
                <img src="logo.png" alt="e-Invitation Logo">
            </div>
            <h1>e-Invitation</h1>
            <p>DESIGNED BY Z & K</p>
        </header>

        <section class="story-section">
            <h2>✨ حكايتنا وشغفنا</h2>
            <p>
                مرحباً بكم في عالمنا الخاص! مشروع <strong>e-Invitation</strong> هو ثمرة قصة حب وشغف جمع
